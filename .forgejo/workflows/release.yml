name: Release to crates.io

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v0.0.1)"
        type: string
        required: true
      skip_preflight:
        description: "Skip preflight checks (useful when retrying a failed publish)"
        type: boolean
        default: true
      skip_version_bump:
        description: "Skip version bump PR (if already created from a prior run)"
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      skip_preflight:
        description: "Skip preflight checks (useful when retrying a failed publish)"
        type: boolean
        default: true
      skip_version_bump:
        description: "Skip version bump PR (if already created from a prior run)"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    name: Pre-release checks
    if: github.event_name != 'workflow_dispatch' || !inputs.skip_preflight
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust stable
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: https://github.com/actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify tag matches root Cargo.toml version
        run: |
          REF_TAG="${{ inputs.tag || github.ref_name }}"
          TAG="${REF_TAG#v}"
          CARGO_VERSION="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          if [ "$TAG" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          echo "Version $TAG confirmed."

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build release
        run: cargo build --workspace --release

  publish:
    name: Publish to crates.io
    needs: preflight
    if: always() && (needs.preflight.result == 'success' || needs.preflight.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Install Rust stable
        uses: https://github.com/dtolnay/rust-toolchain@stable

      - name: Publish frontend-core
        run: |
          output=$(cargo publish --package frontend-core 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already uploaded"; then
              echo "frontend-core already published, skipping"
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish frontend-js-scanner
        run: |
          output=$(cargo publish --package frontend-js-scanner 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already uploaded"; then
              echo "frontend-js-scanner already published, skipping"
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish frontend-css-scanner
        run: |
          output=$(cargo publish --package frontend-css-scanner 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already uploaded"; then
              echo "frontend-css-scanner already published, skipping"
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish frontend-fix-engine
        run: |
          output=$(cargo publish --package frontend-fix-engine 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already uploaded"; then
              echo "frontend-fix-engine already published, skipping"
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish frontend-grpc
        run: |
          output=$(cargo publish --package frontend-grpc 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already uploaded"; then
              echo "frontend-grpc already published, skipping"
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish patternfly-fix-context
        run: |
          output=$(cargo publish --package patternfly-fix-context 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already uploaded"; then
              echo "patternfly-fix-context already published, skipping"
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish frontend-analyzer-provider
        run: |
          output=$(cargo publish --package frontend-analyzer-provider 2>&1) && echo "$output" || {
            if echo "$output" | grep -q "already uploaded"; then
              echo "frontend-analyzer-provider already published, skipping"
            else
              echo "$output"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  version-bump:
    name: Bump version for next development cycle
    needs: publish
    if: "!(github.event_name == 'workflow_dispatch' && inputs.skip_version_bump)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: https://github.com/actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "forgejo-actions[bot]"
          git config user.email "forgejo-actions[bot]@noreply.localhost"

      - name: Compute next patch version
        id: next
        run: |
          CURRENT="$(sed -n 's/^version *= *"\(.*\)"/\1/p' Cargo.toml | head -1)"
          MAJOR="$(echo "$CURRENT" | cut -d. -f1)"
          MINOR="$(echo "$CURRENT" | cut -d. -f2)"
          PATCH="$(echo "$CURRENT" | cut -d. -f3)"
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"

      - name: Install Rust stable
        uses: https://github.com/dtolnay/rust-toolchain@stable

      - name: Bump all Cargo.toml versions and dependency constraints
        run: |
          CURRENT="${{ steps.next.outputs.current }}"
          NEXT="${{ steps.next.outputs.next }}"
          for manifest in \
            Cargo.toml \
            crates/core/Cargo.toml \
            crates/js-scanner/Cargo.toml \
            crates/css-scanner/Cargo.toml \
            crates/grpc/Cargo.toml \
            crates/fix-engine/Cargo.toml \
            crates/patternfly-fix-context/Cargo.toml; do
            # Bump package version (start-of-line version = "...")
            sed -i "s/^version *= *\"${CURRENT}\"/version = \"${NEXT}\"/" "$manifest"
            # Bump workspace dependency version constraints (inline version = "...")
            sed -i "s/version = \"${CURRENT}\", path/version = \"${NEXT}\", path/g" "$manifest"
          done

      - name: Update Cargo.lock
        run: cargo generate-lockfile

      - name: Create branch and commit
        run: |
          BRANCH="chore/bump-v${{ steps.next.outputs.next }}"
          git checkout -b "$BRANCH"
          git add Cargo.toml Cargo.lock crates/*/Cargo.toml
          git commit -m "chore: bump version to ${{ steps.next.outputs.next }}"
          git push origin "$BRANCH"

      - name: Open pull request
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-v${{ steps.next.outputs.next }}"
          BODY="Automated version bump after publishing v${{ steps.next.outputs.current }} to crates.io."
          # Forgejo API -- compatible with Gitea
          curl -s -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"chore: bump version to ${{ steps.next.outputs.next }}\",\"body\":\"${BODY}\",\"head\":\"${BRANCH}\",\"base\":\"main\"}" \
            "${GITHUB_SERVER_URL}/api/v1/repos/${GITHUB_REPOSITORY}/pulls"
