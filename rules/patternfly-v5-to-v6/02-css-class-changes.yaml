- ruleID: pfv6-css-nav-expandable
  description: "NavExpandable: pf-m-expandable modifier removed from li"
  labels:
    - change-type=css-class
    - has-codemod=false
  effort: 3
  category: potential
  when:
    frontend.cssclass:
      pattern: "pf-m-expandable"
  message: "The CSS class 'pf-m-expandable' is no longer applied to NavExpandable <li> elements in PF v6. Custom styles targeting this selector will silently break. Review and update CSS overrides."

- ruleID: pfv6-css-number-input-validated
  description: "NumberInput: validated state CSS modifier removed"
  labels:
    - change-type=css-class
    - has-codemod=false
  effort: 3
  category: potential
  when:
    frontend.cssclass:
      pattern: "pf-m-(success|warning|error)"
      filePattern: "\\.(css|scss)$"
  message: "NumberInput no longer applies validated state CSS modifiers (pf-m-success/warning/error) in PF v6. Custom CSS targeting these modifiers on NumberInput will silently break."

- ruleID: pfv6-css-title-size
  description: "Title: default size mapping changed"
  labels:
    - change-type=css-class
    - has-codemod=false
    - impact=frontend-testing
  effort: 2
  category: potential
  when:
    frontend.referenced:
      pattern: "^Title$"
      location: JSX_COMPONENT
  message: "Title component default size changed from headingLevelSizeMap to undefined in PF v6. Titles without explicit 'size' prop may render differently."

- ruleID: pfv6-css-v5-prefix
  description: "PF v5 CSS class prefix pf-v5- still in use"
  labels:
    - change-type=css-class
    - has-codemod=false
  effort: 2
  category: mandatory
  when:
    frontend.cssclass:
      pattern: "pf-v5-"
  message: "CSS class prefix 'pf-v5-' must be updated for PF v6. This includes component classes (pf-v5-c-*), theme classes (pf-v5-theme-*), utility classes (pf-v5-u-*), and modifier classes."

- ruleID: pfv6-css-variable-v5-prefix
  description: "PF v5 CSS variable prefix --pf-v5- still in use"
  labels:
    - change-type=css-variable
    - has-codemod=false
  effort: 2
  category: mandatory
  when:
    frontend.cssvar:
      pattern: "--pf-v5-"
  message: "CSS variable prefix '--pf-v5-' has changed in PF v6. Update to the new PF v6 token format."

- ruleID: pfv6-css-variable-logical-properties
  description: "PF v6 CSS variables use logical properties (BlockStart/InlineEnd)"
  labels:
    - change-type=css-variable
    - has-codemod=false
  effort: 2
  category: mandatory
  when:
    frontend.cssvar:
      pattern: "--pf-(v5|v6)-.*--(Padding|Margin|Inset|BorderWidth|MaxHeight|Height|Width|Offset|TranslateX|TranslateY)(Top|Bottom|Left|Right)\\b"
  message: "PF v6 CSS custom properties use CSS logical property suffixes instead of physical ones. Rename: Top->BlockStart, Bottom->BlockEnd, Left->InlineStart, Right->InlineEnd. For example, --pf-v6-c-table__expandable-row-content--PaddingTop becomes --pf-v6-c-table__expandable-row-content--PaddingBlockStart."

# NOTE: Snapshot rule (pfv6-stale-snapshots) removed — snapshots should be
# regenerated by running tests after migration, not edited individually.

# NOTE: This rule requires kantra (uses builtin.filecontent with and/not).
# It will not fire when using standalone `analyze` command.
- ruleID: pfv6-missing-utilities-css-import
  description: "PF v6 requires separate utilities CSS import"
  labels:
    - change-type=missing-import
    - has-codemod=false
  effort: 1
  category: mandatory
  when:
    and:
      - builtin.filecontent:
          pattern: "@patternfly/react-core/dist/styles/base\\.css"
          filePattern: "\\.(ts|tsx|js|jsx)$"
      - not: true
        builtin.filecontent:
          pattern: "@patternfly/patternfly/utilities/_index\\.css"
          filePattern: "\\.(ts|tsx|js|jsx)$"
  message: "PF v6 moved utility CSS classes into a separate file. Add import '@patternfly/patternfly/utilities/_index.css' alongside your existing base.css import. Without this, PF utility classes (pf-v6-u-mb-lg, pf-v6-u-text-align-center, etc.) will not render."

