# Prop value changes — codemod-covered

- ruleID: pfv6-prop-value-banner-color
  description: "Banner/Label: color values cyan/gold renamed"
  labels: [change-type=prop-value-change, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^color$", location: JSX_PROP, component: "^(Banner|Label)$", value: "^(cyan|gold)$" }
  message: "Color prop values renamed: 'cyan'->'teal', 'gold'->'yellow' on Banner and Label in PF v6. Codemod: colorProps-replaced-colors"

- ruleID: pfv6-prop-value-nav-tertiary
  description: "Nav: variant='tertiary' replaced with 'horizontal-subnav'"
  labels: [change-type=prop-value-change, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^variant$", location: JSX_PROP, component: "^Nav$", value: "^tertiary$" }
  message: "Nav variant='tertiary' replaced with variant='horizontal-subnav' in PF v6. Codemod: nav-remove-tertiary-variant"

- ruleID: pfv6-prop-value-drawer-colorvariant
  description: "Drawer: colorVariant values changed"
  labels: [change-type=prop-value-change, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^(DrawerColorVariant|colorVariant)$", location: JSX_PROP }
  message: "DrawerContent/DrawerPanelContent colorVariant values changed: 'no-background' removed, 'light-200'→'secondary'. Codemod: drawer-replace-colorVariant-light200"

- ruleID: pfv6-prop-value-toolbar-group-variant
