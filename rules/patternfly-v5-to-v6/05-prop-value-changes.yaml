# Additional prop value changes

- ruleID: pfv6-prop-value-banner-variant
  description: "Banner: variant prop replaced with color"
  labels: [change-type=prop-value-change, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^variant$", location: JSX_PROP, component: "^Banner$" }
  message: "Banner 'variant' prop replaced with 'color' in PF v6. Codemod: banner-replace-variantProp"

- ruleID: pfv6-prop-value-menutoggle-variant
  description: "MenuToggle: variant='plain' may need updating to plainText or typeahead"
  labels: [change-type=prop-value-change, has-codemod=true]
  effort: 1
  category: potential
  when:
    frontend.referenced: { pattern: "^variant$", location: JSX_PROP, component: "^MenuToggle$", value: "^plain$" }
  message: "MenuToggle variant='plain' review needed for PF v6. IMPORTANT: variant='plain' is STILL VALID in PF6 for icon-only toggles (kebab menus, icon buttons, etc.) — do NOT change these. Only change to variant='plainText' if the toggle displays TEXT content without a border, or to variant='typeahead' if used for typeahead search inputs. When in doubt, keep variant='plain'. Codemod: menuToggle-replace-variant-plain"

- ruleID: pfv6-prop-value-pagesection-variant
  description: "PageSection: variant values narrowed"
  labels: [change-type=prop-value-change, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^variant$", location: JSX_PROP, component: "^PageSection$", value: "^(dark|darker|light)$" }
  message: "PageSection variant now only accepts 'default' or 'secondary' in PF v6. Values 'dark', 'darker', and 'light' have been removed. If you used variant='light' to control page body styling, replace with hasBodyWrapper={false}. Additionally, variant classes are now only applied when type='default', and isWidthLimited no longer controls PageBody wrapping — use the new hasBodyWrapper prop explicitly. Codemod: pageSection-update-variant"

- ruleID: pfv6-prop-value-pagesection-type
  description: "PageSection: type='nav' removed"
  labels: [change-type=prop-value-change, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^type$", location: JSX_PROP, component: "^PageSection$", value: "^nav$" }
  message: "PageSection type value 'nav' has been removed in PF v6. Codemod: pageSection-remove-nav-type"
