  message: "FormGroup 'labelIcon' prop renamed to 'labelHelp' in PF v6. Codemod: formGroup-rename-labelIcon"

- ruleID: pfv6-prop-rename-tabs-issecondary
  description: "Tabs: isSecondary renamed to isSubtab"
  labels: [change-type=prop-rename, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^isSecondary$", location: JSX_PROP, component: "^Tabs$" }
  message: "Tabs 'isSecondary' prop renamed to 'isSubtab' in PF v6. Codemod: tabs-renamed-isSecondary-prop"

- ruleID: pfv6-prop-rename-checkbox-label-position
  description: "Checkbox/Radio: isLabelBeforeButton replaced with labelPosition"
  labels: [change-type=prop-rename, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^isLabelBeforeButton$", location: JSX_PROP, component: "^(Checkbox|Radio)$" }
  message: "Checkbox/Radio 'isLabelBeforeButton' replaced with labelPosition='start' in PF v6. Codemod: checkbox-radio-replace-isLabelBeforeButton"

- ruleID: pfv6-prop-rename-toolbar-chip-to-label
  description: "Toolbar: chip-based props renamed to label-based"
  labels: [change-type=prop-rename, has-codemod=true]
  effort: 3
  category: mandatory
  when:
    or:
      - frontend.referenced: { pattern: "^(customChipGroupContent|chipGroupContentRef|chipGroupExpandedText|chipGroupCollapsedText|chips|deleteChip|deleteChipGroup)$", location: JSX_PROP }
  message: "Toolbar chip-based props renamed to label equivalents in PF v6 (e.g., chips→labels, deleteChip→deleteLabel). Codemod: toolbar-replace-chip-instances"

- ruleID: pfv6-prop-rename-menutoggle-splitbutton
  description: "MenuToggle: splitButtonOptions renamed to splitButtonItems"
  labels: [change-type=prop-rename, has-codemod=true]
  effort: 2
  category: mandatory
  when:
    frontend.referenced: { pattern: "^splitButtonOptions$", location: JSX_PROP, component: "^MenuToggle$" }
  message: "MenuToggle 'splitButtonOptions' renamed to 'splitButtonItems' in PF v6. The SplitButtonOptions interface is removed; pass items directly. Codemod: menuToggle-replace-splitButtonOptions"

- ruleID: pfv6-prop-rename-toolbar-align
  description: "Toolbar: align values alignLeft/alignRight renamed"
  labels: [change-type=prop-rename, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    builtin.filecontent:
      pattern: "alignLeft|alignRight"
      filePattern: "\\.(tsx?|jsx)$"
  message: "Toolbar align values renamed: 'alignLeft'->'alignStart', 'alignRight'->'alignEnd' in PF v6. Codemod: toolbar-replace-align-values"

- ruleID: pfv6-prop-rename-toolbar-chip-interfaces
  description: "ToolbarChip/ToolbarChipGroup interfaces renamed"
  labels: [change-type=component-rename, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    or:
      - frontend.referenced: { pattern: "^ToolbarChipGroup$", location: TYPE_REFERENCE }
      - frontend.referenced: { pattern: "^ToolbarChip$", location: TYPE_REFERENCE }
  message: "ToolbarChipGroup renamed to ToolbarLabelGroup and ToolbarChip renamed to ToolbarLabel in PF v6. Codemod: toolbar-replace-chip-instances"

- ruleID: pfv6-prop-rename-innerref-to-ref
  description: "innerRef replaced with standard React ref"
  labels: [change-type=prop-rename, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced:
      pattern: "^innerRef$"
      location: JSX_PROP
      component: "^(MenuToggle|Table|Td|Th|Tr|TextInputGroupMain)$"
  message: "PF v6 adopted standard React ref forwarding. The 'innerRef' prop has been removed on MenuToggle, Table, Td, Th, Tr, and TextInputGroupMain. Use the standard 'ref' prop instead."
