# Prop renames — codemod-covered

- ruleID: pfv6-prop-rename-button-isactive
  description: "Button: isActive renamed to isClicked"
  labels: [change-type=prop-rename, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^isActive$", location: JSX_PROP, component: "^(Button|AlertActionCloseButton|AlertActionLink)$" }
  message: "Button 'isActive' prop renamed to 'isClicked' in PF v6. Codemod: button-rename-isActive"

- ruleID: pfv6-prop-rename-page-header
  description: "Page: header renamed to masthead"
  labels: [change-type=prop-rename, has-codemod=true]
  effort: 1
  category: mandatory
  when:
    frontend.referenced: { pattern: "^header$", location: JSX_PROP, component: "^Page$" }
  message: "Page 'header' prop renamed to 'masthead' in PF v6. Codemod: page-rename-header"

- ruleID: pfv6-prop-rename-page-tertiary-nav
