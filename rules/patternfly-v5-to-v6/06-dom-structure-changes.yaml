# Additional DOM structure changes from pf-codemods-v5-v6.json

- ruleID: pfv6-dom-accordion-item-wrapper
  description: "AccordionItem: wrapping div added"
  labels:
    - change-type=dom-structure
    - has-codemod=false
    - impact=frontend-testing
  effort: 1
  category: potential
  when:
    frontend.referenced:
      pattern: "^AccordionItem$"
      location: JSX_COMPONENT
  message: "AccordionItem now renders a wrapping <div> element in PF v6. This may break CSS selectors or snapshot tests that rely on the previous DOM structure."

- ruleID: pfv6-dom-masthead-layout
  description: "Masthead: MastheadToggle is direct child of Masthead (should be inside MastheadMain)"
  labels:
    - change-type=dom-structure
    - has-codemod=true
  effort: 3
  category: mandatory
  when:
    frontend.referenced:
      pattern: "^MastheadToggle$"
      location: JSX_COMPONENT
      parent: "^Masthead$"
  message: "Masthead layout restructured in PF v6. MastheadToggle must be moved INSIDE MastheadMain (it is currently a sibling). Wrap the Brand component with MastheadLogo inside MastheadBrand. Replace <Button variant='plain'><BarsIcon /></Button> inside MastheadToggle with <PageToggleButton isHamburgerButton onSidebarToggle={handler} />. The new structure is: <Masthead> <MastheadMain> <MastheadToggle>...</MastheadToggle> <MastheadBrand><MastheadLogo>...</MastheadLogo></MastheadBrand> </MastheadMain> <MastheadContent>...</MastheadContent> </Masthead>. Codemod: masthead-name-changes"

