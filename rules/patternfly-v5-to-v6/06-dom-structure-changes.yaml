  effort: 2
  category: potential
  when:
    frontend.referenced:
      pattern: "^NavList$"
      location: JSX_COMPONENT
  message: "NavList scroll buttons are now wrapped in a new <div> and only rendered when scrolling is needed in PF v6. Update tests or CSS targeting scroll button elements."

