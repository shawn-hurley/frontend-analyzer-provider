# DOM structure changes — pipeline extras (no codemod)
# Changes to rendered HTML element tree that break snapshot tests,
# CSS selectors targeting specific DOM structure, and E2E tests.

- ruleID: pfv6-dom-expandable-section-toggle
  description: "ExpandableSectionToggle: wrapper div added, span removed"
  labels:
    - change-type=dom-structure
    - has-codemod=false
    - impact=frontend-testing
  effort: 2
  category: potential
  when:
    frontend.referenced:
      pattern: "^ExpandableSection$"
      location: JSX_COMPONENT
  message: "ExpandableSectionToggle in PF v6 adds a new wrapper <div> around the button and no longer wraps toggle text in a <span>. Update snapshot tests and CSS selectors targeting the toggle DOM structure."

- ruleID: pfv6-dom-navlist-scroll-buttons
  description: "NavList: scroll buttons wrapped and conditionally rendered"
  labels:
    - change-type=dom-structure
    - has-codemod=false
